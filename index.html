<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazer & Raizy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="./icons8-wedding-ring-58.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <h1>
      <span class="shimmer-text">Lazer & Raizy</span>
      <img id="ring" src="./wedding-ring.png" alt="wedding ring">
    </h1>

    <div class="countdown">
      <div class="box"><span id="days">00</span><p>DAYS</p></div>
      <div class="box"><span id="hours">00</span><p>HOURS</p></div>
      <div class="box"><span id="minutes">00</span><p>MIN</p></div>
      <div class="box"><span id="seconds">00</span><p>SEC</p></div>
    </div>
  </div>
  <script>
    const targetDate = new Date("November 17, 2026 18:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) return;

      document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
    }

    setInterval(updateCountdown, 1000);
    updateCountdown(); 
  </script>

</body>
</html>
